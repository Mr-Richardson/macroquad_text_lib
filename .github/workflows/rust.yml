name: Rust CI Auto-Merge

on:
  push:
    branches: [ "unstable" ]

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Format Check
        run: cargo fmt --all -- --check

      - name: Optimization Check
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Functionality Test
        run: cargo test --all-targets --all-features

  deploy-to-master:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Auto-Merge via PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin master
          if git diff --quiet origin/master origin/unstable; then
            echo "No changes between unstable and master. Skip merge."
            exit 0
          fi
          
          commit_logs=$(git log origin/master..origin/unstable --oneline | sed 's/^/* /')
          
          pr_body=$(cat <<EOF
Automatically generated by GitHub Actions:

$commit_logs
EOF
)

          pr_url=$(gh pr create \
            --base master \
            --head unstable \
            --title "Auto-Merge: unstable -> master" \
            --body "$pr_body")

            gh pr merge "$pr_url" --rebase --delete-branch=false